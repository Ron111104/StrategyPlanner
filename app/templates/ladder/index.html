{% extends "layouts/base.html" %}
{% block title %}Ladder Planner{% endblock %}
{% block content %}
<div x-data="ladderApp()" x-init="init()" class="space-y-4">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold text-white">Adaptive Strategy Ladder</h1>
    <span class="text-xs text-gray-500" x-text="'Generated: ' + (ladder ? new Date(ladder.generated_at).toLocaleString() : '—')"></span>
  </div>

  <!-- Controls -->
  <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
    <!-- Product -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Product</label>
      <select x-model="productKey" @change="loadContracts()" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5">
        {% for key, prod in products.items() %}
        <option value="{{ key }}">{{ prod.display_name }}</option>
        {% endfor %}
      </select>
    </div>
    <!-- Symbol -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Symbol</label>
      <select x-model="symbol" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5">
        <template x-for="s in availableSymbols" :key="s">
          <option :value="s" x-text="s"></option>
        </template>
      </select>
    </div>
    <!-- Timeframe -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Timeframe</label>
      <select x-model="timeframe" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5">
        <option value="1M">1M</option><option value="5M">5M</option><option value="15M">15M</option>
        <option value="1H" selected>1H</option><option value="4H">4H</option><option value="1D">1D</option>
      </select>
    </div>
    <!-- Strategy -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Strategy</label>
      <select x-model="strategy" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5">
        <template x-for="s in strategies" :key="s.name">
          <option :value="s.name" x-text="s.name.replace(/_/g,' ')"></option>
        </template>
      </select>
    </div>
    <!-- Direction -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Direction</label>
      <select x-model="direction" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5">
        <option value="">Auto</option>
        <option value="long">Long</option>
        <option value="short">Short</option>
        <option value="steepener">Steepener</option>
        <option value="flattener">Flattener</option>
      </select>
    </div>
    <!-- Max Levels -->
    <div>
      <label class="block text-[10px] text-gray-400 mb-1">Max Levels</label>
      <input type="number" x-model.number="maxLevels" min="1" max="10" class="w-full bg-gray-800 text-white text-xs border border-gray-700 rounded px-2 py-1.5" />
    </div>
    <!-- Generate -->
    <div class="flex items-end">
      <button @click="generate()" :disabled="loading" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded px-3 py-1.5 disabled:opacity-50">
        <span x-show="!loading">Generate Ladder</span>
        <span x-show="loading">Computing…</span>
      </button>
    </div>
  </div>

  <!-- Error -->
  <div x-show="error" class="bg-red-900/50 border border-red-700 text-red-300 text-xs px-3 py-2 rounded" x-text="error"></div>

  <!-- Ladder Output -->
  <template x-if="ladder">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

      <!-- Ladder Table -->
      <div class="lg:col-span-2 bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-bold text-white">
            <span x-text="ladder.strategy.replace(/_/g,' ')" class="capitalize"></span>
            <span class="text-yellow-400 ml-2" x-text="ladder.direction.toUpperCase()"></span>
          </h2>
          <span class="text-xs px-2 py-0.5 rounded" :class="ladder.confidence >= 0.7 ? 'bg-green-800 text-green-200' : ladder.confidence >= 0.5 ? 'bg-yellow-800 text-yellow-200' : 'bg-red-800 text-red-200'" x-text="(ladder.confidence * 100).toFixed(0) + '% conf'"></span>
        </div>
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-400 border-b border-gray-800">
              <th class="text-left py-1 px-2">Level</th>
              <th class="text-right py-1 px-2">Entry</th>
              <th class="text-right py-1 px-2">Lots</th>
              <th class="text-right py-1 px-2">Cum Lots</th>
              <th class="text-right py-1 px-2">Dist (ticks)</th>
              <th class="text-right py-1 px-2">Risk $</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="lv in ladder.levels" :key="lv.level">
              <tr class="border-b border-gray-800/50 hover:bg-gray-800/40">
                <td class="py-1.5 px-2 text-gray-300" x-text="lv.level"></td>
                <td class="py-1.5 px-2 text-right font-mono text-white" x-text="ladder.instrument_type === 'spread' ? lv.entry_bp?.toFixed(1) + ' bp' : lv.entry_price.toFixed(4)"></td>
                <td class="py-1.5 px-2 text-right text-cyan-400 font-semibold" x-text="lv.lots"></td>
                <td class="py-1.5 px-2 text-right text-gray-400" x-text="lv.cumulative_lots"></td>
                <td class="py-1.5 px-2 text-right text-gray-400" x-text="lv.distance_ticks.toFixed(1)"></td>
                <td class="py-1.5 px-2 text-right text-red-400" x-text="'$' + lv.risk_usd.toFixed(0)"></td>
              </tr>
            </template>
          </tbody>
          <tfoot class="border-t border-gray-700">
            <tr class="text-gray-300 font-semibold">
              <td class="py-2 px-2">Total</td>
              <td class="py-2 px-2 text-right font-mono text-yellow-400" x-text="ladder.instrument_type === 'spread' ? ladder.avg_entry_bp?.toFixed(1) + ' bp avg' : ladder.avg_entry.toFixed(4) + ' avg'"></td>
              <td class="py-2 px-2 text-right text-cyan-400" x-text="ladder.total_lots"></td>
              <td class="py-2 px-2"></td>
              <td class="py-2 px-2"></td>
              <td class="py-2 px-2 text-right text-red-400" x-text="'$' + ladder.total_risk_usd.toFixed(0)"></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Summary Panel -->
      <div class="space-y-3">
        <!-- Risk/Reward -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <h3 class="text-xs font-bold text-gray-400 mb-2">Risk / Reward</h3>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div><span class="text-gray-500">Stop:</span> <span class="text-red-400 font-mono" x-text="ladder.instrument_type === 'spread' ? ladder.stop_bp?.toFixed(1) + ' bp' : ladder.stop.toFixed(4)"></span></div>
            <div><span class="text-gray-500">Stop Dist:</span> <span class="text-gray-300" x-text="ladder.stop_distance_ticks.toFixed(1) + ' ticks'"></span></div>
            <div><span class="text-gray-500">Target 1:</span> <span class="text-green-400 font-mono" x-text="ladder.instrument_type === 'spread' ? ladder.target_1_bp?.toFixed(1) + ' bp' : ladder.target_1.toFixed(4)"></span></div>
            <div><span class="text-gray-500">Target 2:</span> <span class="text-green-400 font-mono" x-text="ladder.target_2 ? (ladder.instrument_type === 'spread' ? ladder.target_2_bp?.toFixed(1) + ' bp' : ladder.target_2.toFixed(4)) : '—'"></span></div>
            <div><span class="text-gray-500">R:R:</span> <span class="font-bold" :class="ladder.risk_reward >= 2 ? 'text-green-400' : ladder.risk_reward >= 1 ? 'text-yellow-400' : 'text-red-400'" x-text="ladder.risk_reward.toFixed(2)"></span></div>
            <div><span class="text-gray-500">Total $:</span> <span class="text-red-400" x-text="'$' + ladder.total_risk_usd.toFixed(0)"></span></div>
          </div>
        </div>
        <!-- Context -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <h3 class="text-xs font-bold text-gray-400 mb-2">Generation Context</h3>
          <div class="space-y-1 text-xs">
            <div><span class="text-gray-500">Regime:</span> <span class="text-white capitalize" x-text="ladder.regime"></span></div>
            <div><span class="text-gray-500">Macro Bias:</span> <span class="text-white capitalize" x-text="ladder.macro_bias"></span></div>
            <div><span class="text-gray-500">Spacing:</span> <span class="text-gray-300" x-text="ladder.spacing_method + ' = ' + ladder.spacing_value.toFixed(4)"></span></div>
            <div x-show="ladder.atr_at_generation"><span class="text-gray-500">ATR:</span> <span class="text-gray-300" x-text="ladder.atr_at_generation?.toFixed(4)"></span></div>
            <div x-show="ladder.dcw_at_generation"><span class="text-gray-500">DCW:</span> <span class="text-gray-300" x-text="ladder.dcw_at_generation?.toFixed(4)"></span></div>
            <div x-show="ladder.vol_percentile != null"><span class="text-gray-500">Vol %ile:</span> <span class="text-gray-300" x-text="ladder.vol_percentile?.toFixed(1) + '%'"></span></div>
            <div x-show="ladder.mtf_alignment != null"><span class="text-gray-500">MTF Align:</span> <span class="text-gray-300" x-text="(ladder.mtf_alignment * 100)?.toFixed(0) + '%'"></span></div>
          </div>
        </div>
        <!-- Warnings -->
        <div x-show="warnings.length > 0" class="bg-yellow-900/30 border border-yellow-800 rounded-lg p-3">
          <h3 class="text-xs font-bold text-yellow-400 mb-1">Warnings</h3>
          <template x-for="w in warnings" :key="w">
            <p class="text-xs text-yellow-300" x-text="w"></p>
          </template>
        </div>
      </div>

    </div>
  </template>

  <!-- Empty state -->
  <div x-show="!ladder && !loading && !error" class="text-center text-gray-600 py-12">
    <p class="text-sm">Select parameters and click <strong class="text-gray-400">Generate Ladder</strong></p>
    <p class="text-xs mt-1">The engine will dynamically compute entries, stops, targets, and sizing from market data.</p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/ladder.js"></script>
{% endblock %}
