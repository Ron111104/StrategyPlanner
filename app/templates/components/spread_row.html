<tr class="border-b border-terminal-border hover:bg-gray-800/50 transition-colors">
    <td class="px-3 py-2 text-xs font-mono font-medium text-white">{{ spread.spread_symbol }}</td>
    <td class="px-3 py-2 text-xs font-mono text-right">{{ "%.4f" | format(spread.front_price) }}</td>
    <td class="px-3 py-2 text-xs font-mono text-right">{{ "%.4f" | format(spread.back_price) }}</td>
    <td class="px-3 py-2 text-xs font-mono text-right {% if spread.spread_bp >= 0 %}text-terminal-green{% else %}text-terminal-red{% endif %}">
        {{ "%+.1f" | format(spread.spread_bp) }} bp
    </td>
    <td class="px-3 py-2 text-[10px] text-terminal-muted">{{ spread.timestamp.strftime('%H:%M:%S') if spread.timestamp else '—' }}</td>
</tr>
