{% extends "layouts/base.html" %}

{% block content %}
<div x-data="strategyApp()" x-init="init()">
    <!-- Controls -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
        <select x-model="selectedProduct" @change="onProductChange()"
                class="bg-terminal-card border border-terminal-border rounded px-3 py-1.5 text-xs text-white focus:border-terminal-accent focus:outline-none">
            {% for key, prod in products.items() %}
            <option value="{{ key }}">{{ prod.display_name }}</option>
            {% endfor %}
        </select>

        <select x-model="selectedSymbol"
                class="bg-terminal-card border border-terminal-border rounded px-3 py-1.5 text-xs text-white font-mono focus:border-terminal-accent focus:outline-none">
            <template x-for="s in availableSymbols" :key="s">
                <option :value="s" x-text="s"></option>
            </template>
        </select>

        <div class="flex gap-1">
            {% for tf in ['1M','5M','15M','1H','4H','1D'] %}
            <button @click="selectedTimeframe='{{ tf }}'"
                    :class="selectedTimeframe === '{{ tf }}' ? 'bg-terminal-accent text-white' : 'bg-terminal-card text-gray-400'"
                    class="px-2 py-1 text-[10px] rounded border border-terminal-border font-mono">{{ tf }}</button>
            {% endfor %}
        </div>

        <div class="ml-auto flex gap-2">
            <button @click="ingestAndEvaluate()"
                    class="bg-terminal-accent hover:bg-blue-600 text-white px-4 py-1.5 text-[10px] rounded font-medium">
                INGEST & EVALUATE
            </button>
        </div>
    </div>

    <div x-show="statusMsg" x-transition class="mb-3 px-3 py-1.5 rounded text-[10px] font-mono"
         :class="statusOk ? 'bg-terminal-green/10 text-terminal-green border border-terminal-green/20' : 'bg-terminal-red/10 text-terminal-red border border-terminal-red/20'"
         x-text="statusMsg"></div>

    <div class="grid grid-cols-12 gap-3">
        <!-- Strategy Chart -->
        <div class="col-span-8 bg-terminal-card border border-terminal-border rounded-lg">
            <div class="px-3 py-2 border-b border-terminal-border flex items-center gap-2">
                <span class="text-xs font-bold text-white font-mono" x-text="selectedSymbol"></span>
                <span class="text-[10px] text-terminal-muted">Strategy View</span>
                <div class="ml-auto flex gap-1">
                    <label class="flex items-center gap-1 text-[10px] text-gray-400">
                        <input type="checkbox" x-model="showATR" class="rounded bg-gray-700 border-gray-600 text-terminal-accent focus:ring-0 w-3 h-3"> ATR
                    </label>
                    <label class="flex items-center gap-1 text-[10px] text-gray-400">
                        <input type="checkbox" x-model="showBB" class="rounded bg-gray-700 border-gray-600 text-terminal-accent focus:ring-0 w-3 h-3"> BB
                    </label>
                    <label class="flex items-center gap-1 text-[10px] text-gray-400">
                        <input type="checkbox" x-model="showDC" class="rounded bg-gray-700 border-gray-600 text-terminal-accent focus:ring-0 w-3 h-3"> DC
                    </label>
                    <label class="flex items-center gap-1 text-[10px] text-gray-400">
                        <input type="checkbox" x-model="showEMA" class="rounded bg-gray-700 border-gray-600 text-terminal-accent focus:ring-0 w-3 h-3"> EMA
                    </label>
                </div>
            </div>
            <div id="strategy-chart" class="w-full" style="height:420px;"></div>
        </div>

        <!-- Strategy Results Panel -->
        <div class="col-span-4 space-y-3">
            <!-- Active Strategies -->
            <div class="bg-terminal-card border border-terminal-border rounded-lg">
                <div class="px-3 py-2 border-b border-terminal-border">
                    <span class="text-[10px] font-bold text-terminal-muted uppercase tracking-widest">Strategy Signals</span>
                </div>
                <div class="overflow-y-auto max-h-64 scrollbar-thin divide-y divide-terminal-border">
                    <template x-for="sig in evalSignals" :key="sig.strategy_name+sig.symbol">
                        <div class="px-3 py-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[10px] font-bold text-white" x-text="sig.strategy_name"></span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded border"
                                      :class="sig.direction === 'long' ? 'border-terminal-green text-terminal-green' : sig.direction === 'short' ? 'border-terminal-red text-terminal-red' : 'border-gray-600 text-gray-400'"
                                      x-text="sig.direction.toUpperCase()"></span>
                            </div>
                            <div class="grid grid-cols-3 gap-1 text-[10px] font-mono">
                                <div><span class="text-terminal-muted block">Entry</span><span class="text-white" x-text="sig.entry_price?.toFixed(4) ?? '—'"></span></div>
                                <div><span class="text-terminal-muted block">Stop</span><span class="text-terminal-red" x-text="sig.stop_price?.toFixed(4) ?? '—'"></span></div>
                                <div><span class="text-terminal-muted block">Target</span><span class="text-terminal-green" x-text="sig.target_price?.toFixed(4) ?? '—'"></span></div>
                            </div>
                            <div class="flex items-center gap-3 mt-1 text-[10px]">
                                <span class="text-terminal-muted">Conf: <span class="text-white" x-text="(sig.confidence*100).toFixed(1)+'%'"></span></span>
                                <span class="text-terminal-muted">R:R <span class="text-white" x-text="sig.risk_reward_ratio?.toFixed(1) ?? '—'"></span></span>
                            </div>
                            <p class="text-[9px] text-terminal-muted mt-1 truncate" x-text="sig.rationale"></p>
                        </div>
                    </template>
                    <div x-show="evalSignals.length===0" class="px-3 py-6 text-center text-[10px] text-terminal-muted">
                        No signals — run evaluation
                    </div>
                </div>
            </div>

            <!-- Entry/Exit Plans -->
            <div class="bg-terminal-card border border-terminal-border rounded-lg">
                <div class="px-3 py-2 border-b border-terminal-border">
                    <span class="text-[10px] font-bold text-terminal-muted uppercase tracking-widest">Entry/Exit Plans</span>
                </div>
                <div class="overflow-y-auto max-h-48 scrollbar-thin divide-y divide-terminal-border">
                    <template x-for="plan in evalPlans" :key="plan.strategy_name+plan.symbol">
                        <div class="px-3 py-2 text-[10px]">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-bold text-white" x-text="plan.strategy_name"></span>
                                <span class="text-terminal-muted" x-text="plan.direction.toUpperCase()"></span>
                            </div>
                            <div class="grid grid-cols-4 gap-1 font-mono">
                                <div><span class="text-terminal-muted block">Entry</span><span class="text-white" x-text="plan.entry_price.toFixed(4)"></span></div>
                                <div><span class="text-terminal-muted block">Stop</span><span class="text-terminal-red" x-text="plan.stop_price.toFixed(4)"></span></div>
                                <div><span class="text-terminal-muted block">T1</span><span class="text-terminal-green" x-text="plan.primary_target.toFixed(4)"></span></div>
                                <div><span class="text-terminal-muted block">T2</span><span class="text-terminal-green" x-text="plan.secondary_target?.toFixed(4) ?? '—'"></span></div>
                            </div>
                            <div class="flex gap-3 mt-1">
                                <span class="text-terminal-muted">Risk: <span class="text-white" x-text="plan.risk_ticks+' ticks'"></span></span>
                                <span class="text-terminal-muted">R:R <span class="text-white" x-text="plan.risk_reward_ratio.toFixed(1)"></span></span>
                            </div>
                        </div>
                    </template>
                    <div x-show="evalPlans.length===0" class="px-3 py-6 text-center text-[10px] text-terminal-muted">
                        No plans generated
                    </div>
                </div>
            </div>

            <!-- Skipped Strategies -->
            <div class="bg-terminal-card border border-terminal-border rounded-lg" x-show="skippedStrats.length > 0">
                <div class="px-3 py-2 border-b border-terminal-border">
                    <span class="text-[10px] font-bold text-terminal-muted uppercase tracking-widest">Skipped</span>
                </div>
                <div class="px-3 py-2 space-y-0.5 max-h-24 overflow-y-auto scrollbar-thin">
                    <template x-for="s in skippedStrats" :key="s">
                        <p class="text-[9px] text-terminal-muted truncate" x-text="s"></p>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/charts.js"></script>
<script src="/static/js/strategy.js"></script>
{% endblock %}
