<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default('Strategy Planner') }} — ZQ Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        terminal: { bg: '#0a0e17', card: '#111827', border: '#1e293b', accent: '#3b82f6', green: '#10b981', red: '#ef4444', amber: '#f59e0b', muted: '#64748b' }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #111827; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .signal-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-950 text-gray-200" x-data="{ sidebarOpen: true }">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-56 bg-terminal-card border-r border-terminal-border flex flex-col shrink-0"
               x-show="sidebarOpen" x-transition>
            <div class="px-4 py-4 border-b border-terminal-border">
                <h1 class="text-sm font-bold text-white tracking-wider uppercase">ZQ Strategy</h1>
                <p class="text-[10px] text-terminal-muted mt-0.5">Institutional Planner</p>
            </div>
            <nav class="flex-1 px-2 py-3 space-y-1 overflow-y-auto scrollbar-thin">
                <a href="/" class="flex items-center gap-2 px-3 py-2 text-xs rounded-md hover:bg-gray-800 {% if page_title == 'Dashboard' %}bg-gray-800 text-white{% else %}text-gray-400{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="/strategy" class="flex items-center gap-2 px-3 py-2 text-xs rounded-md hover:bg-gray-800 {% if page_title == 'Strategy Planner' %}bg-gray-800 text-white{% else %}text-gray-400{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    Strategy
                </a>
                <a href="/risk" class="flex items-center gap-2 px-3 py-2 text-xs rounded-md hover:bg-gray-800 {% if page_title == 'Risk Planner' %}bg-gray-800 text-white{% else %}text-gray-400{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Risk
                </a>
                <a href="/ladder" class="flex items-center gap-2 px-3 py-2 text-xs rounded-md hover:bg-gray-800 {% if page_title == 'Ladder Planner' %}bg-gray-800 text-white{% else %}text-gray-400{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/></svg>
                    Ladder
                </a>
                <a href="/replay" class="flex items-center gap-2 px-3 py-2 text-xs rounded-md hover:bg-gray-800 {% if page_title == 'Replay Engine' %}bg-gray-800 text-white{% else %}text-gray-400{% endif %}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Replay
                </a>
                <div class="pt-3 mt-3 border-t border-terminal-border">
                    <p class="px-3 text-[10px] text-terminal-muted uppercase tracking-widest mb-2">Regime</p>
                    <div id="sidebar-regime" class="px-3">
                        {% include 'components/regime_badge.html' %}
                    </div>
                </div>
            </nav>
            <div class="px-4 py-3 border-t border-terminal-border text-[10px] text-terminal-muted">
                v1.0.0 &middot; Planning Only
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <header class="h-10 bg-terminal-card border-b border-terminal-border flex items-center px-4 gap-3 shrink-0">
                <button @click="sidebarOpen = !sidebarOpen" class="text-gray-500 hover:text-white">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="text-xs font-medium text-white">{{ page_title | default('Dashboard') }}</span>
                <div class="flex-1"></div>
                <div class="flex items-center gap-3 text-[10px] text-terminal-muted">
                    <span id="clock"></span>
                    <span class="w-2 h-2 rounded-full bg-terminal-green"></span>
                </div>
            </header>

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto scrollbar-thin p-4">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function updateClock() {
            const el = document.getElementById('clock');
            if (el) el.textContent = new Date().toISOString().slice(0, 19).replace('T', ' ') + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/utils.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
