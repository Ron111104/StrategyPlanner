indicators:
  atr:
    default_length: 14
    min_length: 5
    max_length: 50

  sma:
    default_lengths:
      - 10
      - 20
      - 50
      - 100
      - 200
    min_length: 2
    max_length: 500

  ema:
    default_lengths:
      - 9
      - 21
      - 50
      - 100
      - 200
    min_length: 2
    max_length: 500

  donchian:
    default_length: 20
    min_length: 5
    max_length: 100

  bollinger:
    default_length: 20
    default_std_dev: 2.0
    min_length: 5
    max_length: 100
    min_std_dev: 0.5
    max_std_dev: 4.0

  dcw:
    default_length: 20
    min_length: 5
    max_length: 100

  hma:
    default_lengths:
      - 9
      - 16
    min_length: 4
    max_length: 200

  kama:
    default_lengths:
      - 10
    fast_period: 2
    slow_period: 30

  rsi:
    default_length: 14
    overbought: 70
    oversold: 30

  macd:
    fast: 12
    slow: 26
    signal: 9

  keltner:
    default_length: 20
    default_multiplier: 1.5

  stoch_rsi:
    rsi_length: 14
    stoch_length: 14
    k_smooth: 3
    d_smooth: 3

strategies:
  trend_fed_repricing:
    enabled: true
    priority: 1
    applicable_regimes:
      - trend
    applicable_timeframes:
      - 1H
      - 4H
      - 1D
    min_confidence: 0.6

  mean_reversion_range:
    enabled: true
    priority: 2
    applicable_regimes:
      - range
    applicable_timeframes:
      - 15M
      - 1H
      - 4H
    min_confidence: 0.5

  event_momentum:
    enabled: true
    priority: 3
    applicable_regimes:
      - event
    applicable_timeframes:
      - 1M
      - 5M
      - 15M
    min_confidence: 0.7

  event_fade:
    enabled: true
    priority: 4
    applicable_regimes:
      - event
    applicable_timeframes:
      - 5M
      - 15M
      - 1H
    min_confidence: 0.65

  volatility_fade:
    enabled: true
    priority: 5
    applicable_regimes:
      - volatility
    applicable_timeframes:
      - 15M
      - 1H
      - 4H
    min_confidence: 0.55

  curve_steepener:
    enabled: true
    priority: 6
    applicable_regimes:
      - trend
      - range
    applicable_timeframes:
      - 1H
      - 4H
      - 1D
    min_confidence: 0.6
    spread_only: true

  curve_flattener:
    enabled: true
    priority: 7
    applicable_regimes:
      - trend
      - range
    applicable_timeframes:
      - 1H
      - 4H
      - 1D
    min_confidence: 0.6
    spread_only: true

risk:
  max_position_lots: 100
  max_risk_per_trade_usd: 50000.0
  max_daily_risk_usd: 200000.0
  default_slippage_ticks: 1
  default_commission_per_lot: 2.50
  volatility_scaling_enabled: true
  volatility_scaling_lookback: 20
  max_ladder_levels: 5
  ladder_scale_factor: 1.5

event_windows:
  fomc_pre_hours: 24
  fomc_post_hours: 4
  nfp_pre_hours: 12
  nfp_post_hours: 2
  cpi_pre_hours: 12
  cpi_post_hours: 2

signal_thresholds:
  strong_buy: 0.8
  buy: 0.6
  neutral_upper: 0.55
  neutral_lower: 0.45
  sell: 0.4
  strong_sell: 0.2

timeframes:
  allowed:
    - 1M
    - 5M
    - 15M
    - 1H
    - 4H
    - 1D
  default_chart: 1H
  default_indicator: 1H
  default_strategy: 4H

ladder:
  max_levels: 5
  default_lot_profile: pyramid
  event_single_entry: true
  snap_to_tick_grid: true
  spacing_regime:
    trend:
      source: ATR
      multiplier: 0.5
    range:
      source: DCW
      multiplier: 0.25
    volatility:
      source: ATR
      multiplier: 1.2
    event:
      source: NONE
      multiplier: 0.0
  timeframe_multipliers:
    1M: 0.3
    5M: 0.5
    15M: 0.7
    1H: 1.0
    4H: 1.5
    1D: 2.5

mtf:
  enabled: true
  composite_weights:
    trend: 0.50
    volatility: 0.25
    structure: 0.25
