version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zq-strategy-planner
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro  # Mount for development hot-reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
