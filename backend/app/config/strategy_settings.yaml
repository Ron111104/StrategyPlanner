indicators:
  atr:
    length: 14
    smoothing: wilder
  sma:
    lengths: [10, 20, 50]
  ema:
    lengths: [9, 21, 50]
  donchian:
    length: 20
  bollinger:
    length: 20
    std_dev: 2.0
  dcw:
    length: 20

strategy:
  min_bars_required: 51
  confidence_threshold: 0.6
  max_simultaneous_signals: 5

risk:
  default_risk_per_trade_usd: 500.0
  max_risk_per_trade_usd: 2000.0
  default_slippage_ticks: 1
  default_commission_per_side: 2.50
  event_risk_reduction: 0.5
  max_position_size: 50
  volatility_sizing_enabled: true

regime:
  trend_atr_threshold: 1.5
  volatility_atr_threshold: 2.0
  range_dcw_threshold: 0.3
  event_window_hours: 4
  regime_expiry_hours: 24

timeframes:
  allowed:
    - 1M
    - 5M
    - 15M
    - 1H
    - 4H
    - 1D
  default: 1H

replay:
  default_speed: 1.0
  max_speed: 10.0
  bar_buffer: 100
