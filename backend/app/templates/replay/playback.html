<!-- Playback Controls - HTMX Partial -->
<div class="flex items-center justify-center gap-4" id="playback-controls">
    <div class="flex items-center gap-2">
        <button hx-post="/api/replay/step-back" hx-target="#playback-state" class="p-2 rounded-md bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors" title="Step Back">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>

        <button id="play-pause-btn" class="p-3 rounded-full bg-emerald-600 hover:bg-emerald-500 text-white transition-colors" title="Play/Pause">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"></path>
            </svg>
        </button>

        <button hx-post="/api/replay/step-forward" hx-target="#playback-state" class="p-2 rounded-md bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors" title="Step Forward">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
    </div>

    <div class="flex items-center gap-2 text-sm">
        <span class="text-gray-500">Speed:</span>
        <select id="replay-speed" class="bg-[#1a1f2e] border border-gray-600 rounded px-2 py-1 text-gray-300 text-xs">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="5">5x</option>
            <option value="10">10x</option>
        </select>
    </div>

    <div id="playback-state" class="flex items-center gap-3 text-sm text-gray-400">
        {% if current_bar is defined %}
        <span class="font-mono">Bar {{ current_bar }} / {{ total_bars }}</span>
        <div class="w-32 bg-gray-700 rounded-full h-1.5">
            <div class="bg-cyan-500 h-1.5 rounded-full" style="width: {{ (current_bar / total_bars * 100) if total_bars > 0 else 0 }}%"></div>
        </div>
        {% else %}
        <span class="font-mono">No data loaded</span>
        {% endif %}
    </div>
</div>
