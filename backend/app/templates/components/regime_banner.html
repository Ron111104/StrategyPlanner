<!-- Regime Banner Component
  Variables:
    - regime: current regime string (TRENDING, VOLATILE, MEAN_REVERT, NEUTRAL)
    - bias: macro bias string (HAWKISH, DOVISH, NEUTRAL)
    - regime_confidence: confidence percentage (0-100)
    - regime_updated_at: ISO timestamp of last update
    - next_event: optional object with {name, datetime, countdown}
-->
<div class="rounded-lg bg-[#1a1f2e] border border-gray-700/50 p-3"
     hx-get="/api/regime/status"
     hx-trigger="every 60s"
     hx-swap="outerHTML"
>
  <div class="flex items-center justify-between flex-wrap gap-3">
    <!-- Regime Badge -->
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <span class="relative flex h-2.5 w-2.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75
            {% if regime == 'TRENDING' %}bg-cyan-400
            {% elif regime == 'VOLATILE' %}bg-rose-400
            {% elif regime == 'MEAN_REVERT' %}bg-amber-400
            {% else %}bg-gray-400{% endif %}
          "></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5
            {% if regime == 'TRENDING' %}bg-cyan-400
            {% elif regime == 'VOLATILE' %}bg-rose-400
            {% elif regime == 'MEAN_REVERT' %}bg-amber-400
            {% else %}bg-gray-400{% endif %}
          "></span>
        </span>
        <div>
          <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Current Regime</span>
          <span class="text-sm font-mono font-bold
            {% if regime == 'TRENDING' %}text-cyan-400
            {% elif regime == 'VOLATILE' %}text-rose-400
            {% elif regime == 'MEAN_REVERT' %}text-amber-400
            {% else %}text-gray-300{% endif %}
          ">{{ regime | default("NEUTRAL") }}</span>
        </div>
      </div>

      <!-- Divider -->
      <div class="h-8 w-px bg-gray-700/50"></div>

      <!-- Macro Bias -->
      <div>
        <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Macro Bias</span>
        <span class="text-sm font-mono font-bold
          {% if bias == 'HAWKISH' %}text-rose-400
          {% elif bias == 'DOVISH' %}text-emerald-400
          {% else %}text-amber-400{% endif %}
        ">{{ bias | default("NEUTRAL") }}</span>
      </div>

      <!-- Divider -->
      <div class="h-8 w-px bg-gray-700/50"></div>

      <!-- Confidence -->
      <div>
        <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Confidence</span>
        <div class="flex items-center gap-2">
          <div class="w-20 h-1.5 bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full rounded-full
              {% if regime_confidence|default(70)|int >= 75 %}bg-emerald-400
              {% elif regime_confidence|default(70)|int >= 50 %}bg-amber-400
              {% else %}bg-rose-400{% endif %}
            " style="width: {{ regime_confidence | default(70) }}%"></div>
          </div>
          <span class="text-sm font-mono font-semibold
            {% if regime_confidence|default(70)|int >= 75 %}text-emerald-400
            {% elif regime_confidence|default(70)|int >= 50 %}text-amber-400
            {% else %}text-rose-400{% endif %}
          ">{{ regime_confidence | default(70) }}%</span>
        </div>
      </div>
    </div>

    <!-- Right side: Time since update + Event countdown -->
    <div class="flex items-center gap-4">
      <!-- Last Updated -->
      <div class="text-right">
        <span class="text-[10px] text-gray-500 uppercase tracking-wider block">Updated</span>
        <span class="text-xs font-mono text-gray-400" x-data x-init="
          const updateTime = new Date('{{ regime_updated_at | default('2025-05-21T12:00:00Z') }}');
          setInterval(() => {
            const diff = Math.floor((Date.now() - updateTime) / 60000);
            if (diff < 60) $el.textContent = diff + 'm ago';
            else if (diff < 1440) $el.textContent = Math.floor(diff/60) + 'h ago';
            else $el.textContent = Math.floor(diff/1440) + 'd ago';
          }, 30000);
          const diff = Math.floor((Date.now() - updateTime) / 60000);
          if (diff < 60) $el.textContent = diff + 'm ago';
          else if (diff < 1440) $el.textContent = Math.floor(diff/60) + 'h ago';
          else $el.textContent = Math.floor(diff/1440) + 'd ago';
        "></span>
      </div>

      {% if next_event %}
      <!-- Divider -->
      <div class="h-8 w-px bg-gray-700/50"></div>

      <!-- Event Countdown -->
      <div class="text-right">
        <span class="text-[10px] text-gray-500 uppercase tracking-wider block">{{ next_event.name | default("FOMC") }}</span>
        <span class="text-xs font-mono text-amber-400" x-data x-init="
          const eventTime = new Date('{{ next_event.datetime }}');
          function updateCountdown() {
            const diff = eventTime - Date.now();
            if (diff <= 0) { $el.textContent = 'NOW'; return; }
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            if (days > 0) $el.textContent = days + 'd ' + hours + 'h';
            else $el.textContent = hours + 'h ' + mins + 'm';
          }
          updateCountdown();
          setInterval(updateCountdown, 60000);
        "></span>
      </div>
      {% endif %}
    </div>
  </div>
</div>
