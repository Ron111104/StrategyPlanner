<!-- Strategy Card Component
  Variables:
    - strat: object with {name, product, direction, signal_count, avg_confidence, last_signal_time, status}
-->
<div class="rounded-lg bg-[#1a1f2e] border border-gray-700/50 p-3 hover:border-gray-600/50 transition-all duration-200 cursor-pointer group"
     hx-get="/api/strategy/evaluate?product={{ strat.product | default('ZQM2025') }}&strategy={{ strat.name | default('') | urlencode }}"
     hx-target="#strategy-results"
     hx-swap="innerHTML"
     hx-indicator=".htmx-indicator"
>
  <!-- Top row -->
  <div class="flex items-center justify-between mb-2">
    <span class="text-xs font-semibold text-gray-200 group-hover:text-cyan-400 transition-colors">{{ strat.name | default("Breakout") }}</span>
    <span class="w-2 h-2 rounded-full
      {% if strat.status == 'active' %}bg-emerald-400
      {% elif strat.status == 'pending' %}bg-amber-400
      {% else %}bg-gray-600{% endif %}
    "></span>
  </div>

  <!-- Product & Direction -->
  <div class="flex items-center gap-2 mb-2">
    <span class="text-[10px] font-mono text-gray-500 bg-gray-700/30 px-1.5 py-0.5 rounded">{{ strat.product | default("ZQM2025") }}</span>
    {% if strat.direction %}
      <span class="text-[10px] font-mono font-semibold
        {% if strat.direction == 'LONG' %}text-emerald-400
        {% elif strat.direction == 'SHORT' %}text-rose-400
        {% else %}text-gray-500{% endif %}
      ">{{ strat.direction }}</span>
    {% endif %}
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 gap-2">
    <div>
      <span class="text-[10px] text-gray-600 uppercase">Signals</span>
      <p class="text-sm font-mono font-semibold text-gray-200">{{ strat.signal_count | default(0) }}</p>
    </div>
    <div>
      <span class="text-[10px] text-gray-600 uppercase">Avg Conf</span>
      <div class="flex items-center gap-1">
        <p class="text-sm font-mono font-semibold
          {% if strat.avg_confidence|default(0)|int >= 70 %}text-emerald-400
          {% elif strat.avg_confidence|default(0)|int >= 50 %}text-amber-400
          {% else %}text-rose-400{% endif %}
        ">{{ strat.avg_confidence | default(0) }}%</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="mt-2 pt-2 border-t border-gray-700/30 flex items-center justify-between">
    <span class="text-[10px] text-gray-600 font-mono">{{ strat.last_signal_time | default("—") }}</span>
    <svg class="w-3 h-3 text-gray-600 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
  </div>
</div>
