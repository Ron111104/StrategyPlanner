<!-- Chart Card Component
  Variables:
    - chart_id: unique ID for the chart container (required)
    - chart_title: title displayed in header
    - chart_product: product symbol
    - chart_timeframe: timeframe label
    - chart_height: height class (default: h-80)
-->
{% set cid = chart_id | default("chart-" ~ range(1000,9999) | random) %}
{% set cheight = chart_height | default("h-80") %}

<div class="rounded-lg bg-[#1a1f2e] border border-gray-700/50 overflow-hidden" x-data="{ fullscreen: false, indicators: { sma: true, bb: false, vol: true } }">
  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 border-b border-gray-700/30 bg-[#111827]/50">
    <div class="flex items-center gap-2">
      <span class="text-xs font-semibold text-gray-200">{{ chart_title | default("Price Chart") }}</span>
      {% if chart_product %}
        <span class="text-[10px] font-mono text-cyan-400 bg-cyan-400/10 px-1.5 py-0.5 rounded">{{ chart_product }}</span>
      {% endif %}
      {% if chart_timeframe %}
        <span class="text-[10px] font-mono text-gray-500">{{ chart_timeframe }}</span>
      {% endif %}
    </div>

    <div class="flex items-center gap-1">
      <!-- Indicator Toggles -->
      <div class="flex items-center gap-0.5 mr-2">
        <button
          @click="indicators.sma = !indicators.sma"
          :class="indicators.sma ? 'bg-cyan-400/20 text-cyan-400' : 'bg-gray-700/30 text-gray-500'"
          class="px-1.5 py-0.5 rounded text-[9px] font-mono font-medium transition-colors"
        >SMA</button>
        <button
          @click="indicators.bb = !indicators.bb"
          :class="indicators.bb ? 'bg-amber-400/20 text-amber-400' : 'bg-gray-700/30 text-gray-500'"
          class="px-1.5 py-0.5 rounded text-[9px] font-mono font-medium transition-colors"
        >BB</button>
        <button
          @click="indicators.vol = !indicators.vol"
          :class="indicators.vol ? 'bg-emerald-400/20 text-emerald-400' : 'bg-gray-700/30 text-gray-500'"
          class="px-1.5 py-0.5 rounded text-[9px] font-mono font-medium transition-colors"
        >VOL</button>
      </div>

      <!-- Fullscreen Toggle -->
      <button
        @click="fullscreen = !fullscreen"
        class="text-gray-500 hover:text-gray-300 transition-colors p-1 rounded hover:bg-gray-700/30"
      >
        <svg x-show="!fullscreen" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
        </svg>
        <svg x-show="fullscreen" x-cloak class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Chart Container -->
  <div
    :class="fullscreen ? 'fixed inset-0 z-50 bg-[#0a0e17]' : ''"
    class="{{ cheight }} w-full"
  >
    <div id="{{ cid }}" class="w-full h-full"></div>
  </div>
</div>
