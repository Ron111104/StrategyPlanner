<!-- Top Navbar -->
<header class="h-12 bg-[#111827]/80 backdrop-blur-sm border-b border-gray-700/50 flex items-center justify-between px-4 flex-shrink-0">

  <!-- Left: Page Title -->
  <div class="flex items-center gap-3">
    <h1 class="text-sm font-semibold text-gray-100">
      {% block page_title %}{{ page_title | default("Dashboard") }}{% endblock %}
    </h1>
    <span class="text-gray-600">|</span>
    <span class="text-xs text-gray-500 font-mono">CME Fed Funds (ZQ)</span>
  </div>

  <!-- Right: Status Indicators -->
  <div class="flex items-center gap-4">

    <!-- HTMX Loading Indicator -->
    <div class="htmx-indicator flex items-center gap-1.5">
      <svg class="animate-spin h-3.5 w-3.5 text-cyan-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="text-[10px] text-cyan-400">LOADING</span>
    </div>

    <!-- Market Status -->
    <div class="flex items-center gap-1.5" x-data="{ open: {{ market_open | default('true') | lower }} }">
      <span class="relative flex h-2 w-2">
        <span
          :class="open ? 'bg-emerald-400' : 'bg-gray-500'"
          class="animate-pulse-dot absolute inline-flex h-full w-full rounded-full opacity-75"
        ></span>
        <span
          :class="open ? 'bg-emerald-400' : 'bg-gray-500'"
          class="relative inline-flex rounded-full h-2 w-2"
        ></span>
      </span>
      <span
        :class="open ? 'text-emerald-400' : 'text-gray-500'"
        class="text-[10px] font-mono uppercase tracking-wider"
        x-text="open ? 'MARKET OPEN' : 'MARKET CLOSED'"
      ></span>
    </div>

    <!-- Regime Badge -->
    <div class="flex items-center gap-1.5 px-2 py-0.5 rounded bg-[#1a1f2e] border border-gray-700/50">
      <span class="text-[10px] text-gray-500 uppercase">Regime</span>
      <span class="text-[10px] font-mono font-semibold
        {% if regime == 'TRENDING' %}text-cyan-400
        {% elif regime == 'VOLATILE' %}text-rose-400
        {% elif regime == 'MEAN_REVERT' %}text-amber-400
        {% else %}text-gray-300{% endif %}
      ">{{ regime | default("NEUTRAL") }}</span>
    </div>

    <!-- Macro Bias Badge -->
    <div class="flex items-center gap-1.5 px-2 py-0.5 rounded bg-[#1a1f2e] border border-gray-700/50">
      <span class="text-[10px] text-gray-500 uppercase">Bias</span>
      <span class="text-[10px] font-mono font-semibold
        {% if bias == 'HAWKISH' %}text-rose-400
        {% elif bias == 'DOVISH' %}text-emerald-400
        {% else %}text-amber-400{% endif %}
      ">{{ bias | default("NEUTRAL") }}</span>
    </div>

    <!-- Clock -->
    <div class="flex items-center gap-1.5 text-gray-400" x-data="{ time: '' }" x-init="
      setInterval(() => {
        const now = new Date();
        time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }, 1000);
    ">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-xs font-mono" x-text="time"></span>
    </div>

    <!-- Settings -->
    <a href="/settings" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </a>

  </div>
</header>
