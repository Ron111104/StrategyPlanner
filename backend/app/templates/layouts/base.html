<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CME Fed Funds Futures (ZQ) Strategy Planning Platform — Institutional-grade trading terminal for spread analysis, regime detection, and risk management." />
  <meta name="theme-color" content="#0a0e17" />
  <title>{% block title %}ZQ Strategy Planner{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terminal: {
              bg: '#0a0e17',
              panel: '#111827',
              card: '#1a1f2e',
              border: 'rgba(55, 65, 81, 0.5)',
            },
            accent: {
              cyan: '#22d3ee',
              emerald: '#34d399',
              rose: '#fb7185',
              amber: '#fbbf24',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          backdropBlur: {
            xs: '2px',
          },
        },
      },
    };
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <!-- TradingView Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/main.css" />

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-flex; }
    .htmx-request.htmx-indicator { display: inline-flex; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .animate-pulse-dot { animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-[#0a0e17] text-gray-100 antialiased overflow-hidden">
  <div class="flex h-full" x-data="{ sidebarOpen: true }">

    <!-- Sidebar -->
    {% block sidebar %}
      {% include 'layouts/sidebar.html' %}
    {% endblock %}

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <!-- Top Navbar -->
      {% block navbar %}
        {% include 'layouts/navbar.html' %}
      {% endblock %}

      <!-- Page Content -->
      <main class="flex-1 overflow-y-auto overflow-x-hidden p-4 space-y-4">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <!-- Global Alpine.js store -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('market', {
        connected: true,
        regime: '{{ regime | default("NEUTRAL") }}',
        bias: '{{ bias | default("NEUTRAL") }}',
        lastUpdate: null,
        setRegime(r) { this.regime = r; },
        setBias(b) { this.bias = b; },
      });
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
