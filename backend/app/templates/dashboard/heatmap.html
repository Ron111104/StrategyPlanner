<!-- Strategy Heatmap - HTMX Partial -->
<div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-2" id="strategy-heatmap">
    {% if contracts and contracts.outrights %}
    {% for contract in contracts.outrights %}
    <div class="bg-[#1a1f2e] rounded-lg p-3 border border-gray-700/30 hover:border-gray-600 transition-all cursor-pointer group"
        hx-post="/api/strategy/evaluate"
        hx-vals='{"product": "{{ contract.symbol }}", "timeframe": "1H"}'
        hx-target="#signal-results"
        hx-indicator="#eval-spinner">
        <div class="text-center">
            <span class="text-xs font-mono text-cyan-400 font-medium block">{{ contract.symbol }}</span>
            <span class="text-[10px] text-gray-500 block mt-0.5">{{ contract.name[:12] }}</span>
            <div class="mt-2 h-8 flex items-center justify-center">
                <span class="text-lg font-mono text-gray-400 group-hover:text-gray-200 transition-colors">—</span>
            </div>
            <div class="mt-1 w-full bg-gray-700 rounded-full h-0.5">
                <div class="bg-gray-600 h-0.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>
    </div>
    {% endfor %}
    {% else %}
    <div class="col-span-full text-center py-8">
        <p class="text-gray-500 text-sm">No contracts configured</p>
    </div>
    {% endif %}
</div>
